  <text class="labelText" x="35" y="614" text-anchor="middle">3</text>
  <rect class="panel" x="64" y="590" width="1086" height="650" rx="5"/>
  <text class="h2" x="92" y="652">Service list component</text>
  <text class="p" x="92" y="684">Five horizontal service rows with number, title, excerpt, View more button and hover image.</text>
  <g transform="translate(92 730)">
