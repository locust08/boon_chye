    <text class="tiny" x="762" y="152">image + title + excerpt + Details</text>

    <rect class="soft" x="175" y="230" width="320" height="190" rx="8"/>
    <rect class="dash" x="193" y="248" width="284" height="82" rx="7"/>
    <text class="small" x="197" y="358">04</text>
    <text class="h3" x="237" y="358">Renovation</text>
    <text class="tiny" x="237" y="382">image + title + excerpt + Details</text>
    <rect class="soft" x="525" y="230" width="320" height="190" rx="8"/>
    <rect class="dash" x="543" y="248" width="284" height="82" rx="7"/>
