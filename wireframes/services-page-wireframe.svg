  <text class="labelText" x="35" y="146" text-anchor="middle">2</text>
  <rect class="panel" x="64" y="122" width="1086" height="430" rx="5"/>
  <rect class="dash" x="84" y="142" width="1046" height="390" rx="8"/>
  <text class="small" x="607" y="228" text-anchor="middle">our services</text>
  <text class="h1" x="607" y="296" text-anchor="middle">Consolidated Services</text>
  <text class="p" x="607" y="342" text-anchor="middle">Useful content from all nine source sites has been grouped</text>
  <text class="p" x="607" y="368" text-anchor="middle">into one practical service menu.</text>
  <path class="thin" d="M120 500q220-110 420 0t420 0t150-25"/>

